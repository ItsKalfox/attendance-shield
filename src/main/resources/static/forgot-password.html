<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Shield - Forgot Password</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS Link -->
    <link rel="stylesheet" href="/css/login.css">
    
    <style>
        .pulsing-btn {
            background: var(--color-primary) !important;
            color: white !important;
            pointer-events: none;
            opacity: 0.6;
            box-shadow: none !important;
        }

        .btn-inactive {
            background: rgba(255, 255, 255, 0.05) !important;
            color: var(--text-secondary) !important;
            border: 1px solid var(--border-color) !important;
            pointer-events: none;
            box-shadow: none !important;
        }
        
        .otp-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- FORGOT PASSWORD CARD -->
    <div id="auth-card" class="card auth-container">
        <!-- Centered Branding Header -->
        <div style="text-align: center; margin-bottom: 2.25rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="var(--color-primary)" style="filter: drop-shadow(0 0 6px var(--color-primary-glow)); margin-bottom: 0.25rem;">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <h1 style="font-family: var(--font-outfit); font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; line-height: 1.2; text-align: center;">Attendance Shield</h1>
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin: 0; font-weight: 500; text-align: center; text-transform: uppercase; letter-spacing: 0.05em;">Instructor Portal</p>
        </div>

        <!-- Left-Aligned Section Header -->
        <div style="text-align: left; margin-bottom: 1.5rem; width: 100%;">
            <h2 style="font-family: var(--font-outfit); font-size: 1.2rem; font-weight: 600; color: var(--text-primary); margin: 0 0 0.25rem 0;">Reset Password</h2>
            <p style="color: var(--text-secondary); font-size: 0.8rem; margin: 0;">Request an OTP to reset your account credentials</p>
        </div>

        <form id="forgot-form">
            <!-- Email field -->
            <div class="form-group">
                <label for="forgot-email">Email Address</label>
                <input type="email" id="forgot-email" class="form-input" placeholder="example@example.com" required>
            </div>

            <!-- OTP field and Send button -->
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="forgot-otp">OTP Code</label>
                <div class="otp-row">
                    <input type="text" id="forgot-otp" class="form-input" placeholder="Enter 6-digit OTP" style="flex: 1;" maxlength="6">
                    <button type="button" id="btn-send-otp" class="btn btn-primary" style="width: auto; padding: 0.7rem 1.25rem; font-size: 0.85rem; flex-shrink: 0; white-space: nowrap;">Send OTP</button>
                </div>
                <!-- Countdown Timer Container -->
                <div id="otp-timer-container" style="text-align: right; margin-top: 0.35rem; font-size: 0.75rem; min-height: 1.25rem;">
                    <span id="otp-timer-msg" style="color: var(--text-secondary);"></span>
                </div>
            </div>

            <!-- Error message box -->
            <div id="forgot-error-msg" class="hidden" style="margin-top: 0.5rem; margin-bottom: 1rem; padding: 0.6rem 0.85rem; border-radius: 0.5rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem; color: #f87171; text-align: left; line-height: 1.4;"></div>

            <!-- Proceed button, shown below when OTP is sent -->
            <button type="submit" id="forgot-submit-btn" class="btn btn-primary hidden" style="margin-top: 0.5rem; width: 100%;">Reset Password</button>
        </form>

        <!-- Back to Login link -->
        <div style="text-align: center; margin-top: 1.75rem; font-size: 0.8rem;">
            <a href="/login.html" style="color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#f3f4f6'" onmouseout="this.style.color='var(--text-secondary)'">← Back to Sign In</a>
        </div>
    </div>

    <!-- JS Handling -->
    <script>
        const BASE_URL = window.location.origin;
        let countdownInterval = null;

        // Form elements
        const forgotForm = document.getElementById("forgot-form");
        const emailInput = document.getElementById("forgot-email");
        const otpInput = document.getElementById("forgot-otp");
        const sendOtpBtn = document.getElementById("btn-send-otp");
        const otpTimerMsg = document.getElementById("otp-timer-msg");
        const errorMsgEl = document.getElementById("forgot-error-msg");
        const submitBtn = document.getElementById("forgot-submit-btn");

        // Send OTP Button Click Handler
        sendOtpBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            if (!email) {
                showError("Please enter your email address first.");
                return;
            }

            // Clear previous errors
            clearError();

            // Transition to sending state (pulsing dots)
            sendOtpBtn.classList.add("pulsing-btn");
            sendOtpBtn.innerHTML = '<div class="btn-loader"><span></span><span></span><span></span></div>';
            emailInput.disabled = true;

            try {
                const res = await fetch(`${BASE_URL}/api/auth/forgot-password/send-otp`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                if (!res.ok) {
                    let errorData = { message: "Failed to send OTP." };
                    try { errorData = await res.json(); } catch(e) {}
                    throw new Error(errorData.message || "Failed to send OTP.");
                }

                // Transition to inactive OTP Sent state
                sendOtpBtn.classList.remove("pulsing-btn");
                sendOtpBtn.classList.add("btn-inactive");
                sendOtpBtn.textContent = "OTP Sent";

                // Show the Proceed button
                submitBtn.classList.remove("hidden");

                // Start 60 seconds countdown
                startCountdown(60);

            } catch (err) {
                // Restore button and enable email field
                sendOtpBtn.classList.remove("pulsing-btn");
                sendOtpBtn.textContent = "Send OTP";
                emailInput.disabled = false;
                showError(err.message);
            }
        });

        // Submit form (Verify OTP and redirect to new password page)
        forgotForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const otp = otpInput.value.trim();

            if (!email || !otp) {
                showError("Email and OTP are both required.");
                return;
            }

            clearError();
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="btn-loader"><span></span><span></span><span></span></div>';

            try {
                const res = await fetch(`${BASE_URL}/api/auth/forgot-password/verify-otp`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, otp })
                });

                if (!res.ok) {
                    let errorData = { message: "Invalid or expired OTP." };
                    try { errorData = await res.json(); } catch(e) {}
                    throw new Error(errorData.message || "Invalid or expired OTP.");
                }

                // OTP Verified successfully. Save in session state and redirect
                sessionStorage.setItem("reset_email", email);
                sessionStorage.setItem("reset_otp", otp);
                window.location.href = "/reset-new-password.html";

            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Reset Password";
                showError(err.message);
            }
        });

        // Countdown Timer Logic
        function startCountdown(seconds) {
            if (countdownInterval) clearInterval(countdownInterval);
            
            let timeLeft = seconds;
            updateTimerText(timeLeft);

            countdownInterval = setInterval(() => {
                timeLeft--;
                updateTimerText(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    resetSendButton();
                }
            }, 1000);
        }

        function updateTimerText(seconds) {
            otpTimerMsg.textContent = `Resend OTP in ${seconds}s`;
        }

        function resetSendButton() {
            sendOtpBtn.classList.remove("btn-inactive");
            sendOtpBtn.textContent = "Send OTP";
            otpTimerMsg.textContent = "";
            emailInput.disabled = false;
        }

        // Helper Error display
        function showError(msg) {
            errorMsgEl.textContent = msg;
            errorMsgEl.classList.remove("hidden");
        }

        function clearError() {
            errorMsgEl.textContent = "";
            errorMsgEl.classList.add("hidden");
        }
    </script>
</body>

</html>
