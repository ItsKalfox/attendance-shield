<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Shield - Create New Password</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS Link -->
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <!-- RESET PASSWORD CARD -->
    <div id="auth-card" class="card auth-container">
        <!-- Centered Branding Header -->
        <div style="text-align: center; margin-bottom: 2.25rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="var(--color-primary)" style="filter: drop-shadow(0 0 6px var(--color-primary-glow)); margin-bottom: 0.25rem;">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <h1 style="font-family: var(--font-outfit); font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; line-height: 1.2; text-align: center;">Attendance Shield</h1>
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin: 0; font-weight: 500; text-align: center; text-transform: uppercase; letter-spacing: 0.05em;">Instructor Portal</p>
        </div>

        <!-- Left-Aligned Section Header -->
        <div style="text-align: left; margin-bottom: 1.5rem; width: 100%;">
            <h2 style="font-family: var(--font-outfit); font-size: 1.2rem; font-weight: 600; color: var(--text-primary); margin: 0 0 0.25rem 0;">New Password</h2>
            <p style="color: var(--text-secondary); font-size: 0.8rem; margin: 0;">Create a strong, new password for your account</p>
        </div>

        <form id="reset-form">
            <!-- New Password field -->
            <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" class="form-input" placeholder="••••••••" required minlength="4">
            </div>

            <!-- Confirm Password field -->
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
            </div>

            <!-- Error message box -->
            <div id="reset-error-msg" class="hidden" style="margin-top: 0.5rem; margin-bottom: 1rem; padding: 0.6rem 0.85rem; border-radius: 0.5rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem; color: #f87171; text-align: left; line-height: 1.4;"></div>

            <!-- Submit button -->
            <button type="submit" id="btn-submit" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">Reset Password</button>
        </form>
    </div>

    <!-- JS Handling -->
    <script>
        const BASE_URL = window.location.origin;

        // Retrieve OTP session data
        const email = sessionStorage.getItem("reset_email");
        const otp = sessionStorage.getItem("reset_otp");

        // Redirect to forgot page if there is no session token
        if (!email || !otp) {
            window.location.href = "/forgot-password.html";
        }

        const resetForm = document.getElementById("reset-form");
        const newPasswordInput = document.getElementById("new-password");
        const confirmPasswordInput = document.getElementById("confirm-password");
        const submitBtn = document.getElementById("btn-submit");
        const errorMsgEl = document.getElementById("reset-error-msg");

        resetForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (newPassword !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }

            clearError();
            submitBtn.disabled = true;
            submitBtn.textContent = "Updating password...";

            try {
                const res = await fetch(`${BASE_URL}/api/auth/forgot-password/reset`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, otp, newPassword, confirmPassword })
                });

                if (!res.ok) {
                    let errorData = { message: "Failed to reset password." };
                    try { errorData = await res.json(); } catch(e) {}
                    throw new Error(errorData.message || "Failed to reset password.");
                }

                // Clear session data
                sessionStorage.removeItem("reset_email");
                sessionStorage.removeItem("reset_otp");

                // Redirect to success page
                window.location.href = "/reset-success.html";

            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Reset Password";
                showError(err.message);
            }
        });

        // Helper Error display
        function showError(msg) {
            errorMsgEl.textContent = msg;
            errorMsgEl.classList.remove("hidden");
        }

        function clearError() {
            errorMsgEl.textContent = "";
            errorMsgEl.classList.add("hidden");
        }
    </script>
</body>

</html>
